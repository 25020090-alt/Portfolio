<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✏️ SEO — đổi title/description -->
  <title>Portfolio | Nhập môn Công nghệ số & AI</title>
  <meta name="description"
    content="Portfolio học tập môn Nhập môn Công nghệ số và Ứng dụng Trí tuệ nhân tạo — 6 bài tập thực hành." />
  <meta name="theme-color" content="#6c5ce7" />

  <!-- Open Graph -->
  <meta property="og:title" content="Portfolio | Công nghệ số & AI" />
  <meta property="og:description" content="Portfolio học tập môn Nhập môn Công nghệ số và AI." />
  <meta property="og:type" content="website" />

  <!-- Favicon emoji -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />

  <!-- Inline script to set dark mode -->
  <script>
    (function() {
      document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>

<body>

  <!-- Ambient background -->
  <div class="ambient-bg" aria-hidden="true">
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
  </div>

  <!-- Noise texture -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Custom cursor -->
  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <!-- Navigation -->
  <nav class="navbar" role="navigation" aria-label="Điều hướng chính">
    <!-- ✏️ Đổi tên logo -->
    <a href="#home" class="nav-logo">Triệu Văn Duy - 25020090</a>

    <button class="nav-toggle" aria-label="Menu" aria-expanded="false" id="navToggle">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="#home" class="nav-link active" id="nav-home">Portfolio</a></li>

      <!-- ✏️ Thêm trang mới: <li><a href="#ten-trang" class="nav-link">Tên trang</a></li> -->
    </ul>

  </nav>

  <!-- SPA Content -->
  <main id="app" class="page-container" role="main">
    <!-- Nội dung được render bởi app.js -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
      <div style="text-align:center;color:#5a5a78;font-family:'Space Grotesk',sans-serif;">
        <div style="font-size:3rem;margin-bottom:1rem;">🎓</div>
        <div>Đang tải...</div>
      </div>
    </div>
  </main>

  <!-- Project Modal -->
  <div class="modal-overlay" id="projectModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Bài tập</h2>
        <button class="modal-close" aria-label="Đóng">✕</button>
      </div>
      <div class="modal-body"></div>
    </div>
  </div>

  <!-- JS — thứ tự quan trọng -->
  <script src="js/projects.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
